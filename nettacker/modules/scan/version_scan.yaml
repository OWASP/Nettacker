info:
  name: pma_scan
  author: OWASP Nettacker Team
  severity: 3
  description: php my admin finder
  reference:
  profiles:
    - scan
    - http
    - backup
    - low_severity

payloads:
  - library: http
    steps:
      - method: get
        timeout: 3
        headers:
          User-Agent: "{user_agent}"
        allow_redirects: false
        ssl: false
        url:
          nettacker_fuzzer:
            input_format: "{{schema}}://{target}:{{ports}}/index.html"
            prefix: ""
            suffix: ""
            interceptors:
            data:
              schema:
                - "http"
              ports:
                - 80
                - 443
        response:
          condition_type: and
          conditions:
            status_code:
              regex: '200'
              reverse: false
            version_match:
              patterns:
                - 'Version:\s*([0-9.]+)'
              source: content
              expression: '>=1.2.3'
              
            version_dsl:
              patterns:
                - 'Version:\s*([0-9.]+)'
              source: content
              expression: '>=1.2.3'

          log: "response_dependent['version_match']"
