info:
  name: slow_endpoint_scan
  author: Prajwal G N (@Prajwal5755)
  severity: 3
  description: Detects HTTP endpoints that respond slower than 3 seconds which may indicate performance issues or potential DoS attack surfaces.
  service: http
  profiles:
    - scan
    - http
    - low_severity

payloads:
  - library: http
    timeout: 10
    verify: false
    proxies: ""

    steps:
      - method: get
        headers:
          User-Agent: "{user_agent}"
        allow_redirects: false
        ssl: false

        url:
          nettacker_fuzzer:
            input_format: "{{schema}}://{target}:{{ports}}/{{urls}}"
            prefix: ""
            suffix: ""
            interceptors: ""
            data:
              urls:
                - "slow/"
                - "slow"
                - "delay"
                - "timeout"
                - "sleep"
              schema:
                - "http"
              ports:
                - 80
                - 443

        response:
          condition_type: and
          log: "response_dependent['url']"
          conditions:
            responsetime: "> 3"
            url:
              regex: .*
              reverse: false
            status_code:
              regex: 200|401|403
              reverse: false