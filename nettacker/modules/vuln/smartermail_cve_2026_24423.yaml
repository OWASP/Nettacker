info:
  name: smartermail_cve_2026_24423_vuln
  author: OWASP Nettacker Team
  severity: 9.3
  description: |
    CVE-2026-24423 is a critical unauthenticated remote code execution vulnerability in SmarterTools 
    SmarterMail before build 9511. The ConnectToHub API endpoint (/api/v1/settings/sysadmin/connect-to-hub) 
    in SystemAdminSettingsController allows unauthenticated attackers to point the server to a malicious 
    HTTP server. The server then fetches configuration from the attacker-controlled endpoint 
    (/web/api/node-management/setup-initial-connection) which can include the CommandMount parameter, 
    allowing arbitrary OS command execution. CVSS 9.3, actively exploited in ransomware campaigns.
    
    Detection approach: This module sends a POST request to the vulnerable endpoint with a non-routable 
    hubAddress. Vulnerable versions will attempt to connect and return specific error messages, while 
    patched versions respond differently.
  reference:
    - https://www.vulncheck.com/blog/smartermail-connecttohub-rce-cve-2026-24423
    - https://nvd.nist.gov/vuln/detail/CVE-2026-24423
    - https://www.smartertools.com/smartermail/release-notes/current
    - https://www.cve.org/CVERecord?id=CVE-2026-24423
  profiles:
    - vuln
    - http
    - critical_severity
    - cve
    - cve2026
    - smartermail
    - smartertools
    - cisa_kev


payloads:
  - library: http
    steps:
      # Step 1: Check version via licensing/about endpoint (unauthenticated)
      - method: get
        timeout: 5
        headers:
          User-Agent: "{user_agent}"
          Accept: "application/json"
        allow_redirects: false
        ssl: false
        url:
          nettacker_fuzzer:
            input_format: "{{schema}}://{target}:{{ports}}/api/v1/licensing/about"
            prefix: ""
            suffix: ""
            interceptors:
            data:
              schema:
                - "http"
                - "https"
              ports:
                - 80
                - 443
                - 9998
        response:
          condition_type: and
          conditions:
            status_code:
              regex: "200"
              reverse: false
            content:
              # Look for SmarterMail version info - build numbers below 9511 are vulnerable
              regex: "(SmarterMail|smartermail|version|build)"
              reverse: false

      # Step 2: Test ConnectToHub endpoint with VulnCheck approach
      # Send POST to /api/v1/settings/sysadmin/connect-to-hub with hubAddress pointing to non-routable IP
      # Vulnerable versions will accept the request and try to connect, returning specific responses
      - method: post
        timeout: 5
        headers:
          User-Agent: "{user_agent}"
          Content-Type: "application/json"
          Accept: "application/json"
        allow_redirects: false
        ssl: false
        data: '{"hubAddress":"http://127.0.0.1:1", "oneTimePassword":"nettacker-test", "nodeName": "nettacker-probe"}'
        url:
          nettacker_fuzzer:
            input_format: "{{schema}}://{target}:{{ports}}/api/v1/settings/sysadmin/connect-to-hub"
            prefix: ""
            suffix: ""
            interceptors:
            data:
              schema:
                - "http"
                - "https"
              ports:
                - 80
                - 443
                - 9998
        response:
          condition_type: and
          conditions:
            status_code:
              # Vulnerable versions return 200 or 400 with error message about connection
              regex: "(200|400)"
              reverse: false
            content:
              # Vulnerable versions will show connection attempt messages, hub-related errors, or processing indicators
              # Patched versions (9511+) respond with different error or reject the request entirely
              regex: "(Connecting to hub|Failed to mount|connection|hubAddress|setup-initial-connection|nodeName|ClusterId|success.*false|message|machineName)"
              reverse: false
