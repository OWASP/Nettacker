info:
  name: wing_ftp_cve_2025_47813_vuln
  author: Aryan Kumar
  severity: 5
  description: "Wing FTP Server Path Disclosure via overlong UID cookie - Generic Path Matcher"
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2025-47813
  profiles:
    - vuln
    - http
    - wing_ftp

payloads:
  - library: http
    steps:
      - method: post
        timeout: 7
        headers:
          Content-Type: "application/x-www-form-urlencoded"
          Cookie: ""
        data: "username=anonymous&password=anything"
        url: "{target}/loginok.html"
        response:
          condition_type: and
          conditions:
            status_code:
              regex: '200'
              reverse: false
            content:
              regex: '(?:[a-zA-Z]:\\[\\\w\s.-]+|/(?:Users|home|root|var|etc|opt|usr|srv|private|Volumes)/[^\s"<>]+)'
              reverse: false
