info:
  name: gitlab_cve_2021_22175_vuln
  author: luck9823
  severity: 9.8
  description: |
    GitLab Community Edition (CE) and Enterprise Edition (EE) versions 10.5.0 
    through 13.6.6, 13.7.0 through 13.7.6, and 13.8.0 through 13.8.3 contain 
    a server-side request forgery (SSRF) vulnerability. When requests to the 
    internal network for webhooks are enabled, an unauthenticated attacker can 
    exploit this vulnerability even on instances where registration is disabled.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2021-22175
    - https://gitlab.com/gitlab-org/cves/-/blob/master/2021/CVE-2021-22175.json
    - https://gitlab.com/gitlab-org/gitlab/-/issues/294178
    - https://hackerone.com/reports/1059596
  profiles:
    - vuln
    - vulnerability
    - http
    - critical_severity
    - cve
    - cve2021
    - gitlab
    - ssrf
    - server_side_request_forgery

payloads:
  - library: http
    steps:
      - method: get
        timeout: 5
        headers:
          User-Agent: "{user_agent}"
        allow_redirects: true
        ssl: false
        url:
          nettacker_fuzzer:
            input_format: "{{schema}}://{target}:{{ports}}/api/v4/version"
            prefix: ""
            suffix: ""
            interceptors:
            data:
              schema:
                - "http"
                - "https"
              ports:
                - 80
                - 443
                - 8080
                - 8443
        response:
          condition_type: and
          conditions:
            status_code:
              regex: "200"
              reverse: false
            content:
              # Matches vulnerable versions:
              # 10.5.x - 13.6.6
              # 13.7.0 - 13.7.6
              # 13.8.0 - 13.8.3
              regex: '"version":"(10\\.(5|[6-9]|[1-9][0-9]+)\\.[0-9]+|1[12]\\.[0-9]+\\.[0-9]+|13\\.[0-5]\\.[0-9]+|13\\.6\\.[0-6]|13\\.7\\.[0-6]|13\\.8\\.[0-3])"'
              reverse: false
