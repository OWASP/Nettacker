info:
  name: graphql_vuln
  author: OWASP Nettacker Team
  severity: 3
  description: Detects exposed GraphQL introspection endpoints which can
    reveal the full API schema structure to unauthenticated attackers,
    potentially exposing sensitive types, queries, and mutations.
  reference:
    - https://graphql.org/learn/introspection/
    - https://owasp.org/www-project-web-security-testing-guide/v42/4-Web_Application_Security_Testing/12-API_Testing/01-Testing_GraphQL
  profiles:
    - vuln
    - http
    - low_severity
    - graphql

payloads:
  - library: http
    steps:
      - method: post
        timeout: 3
        headers:
          User-Agent: "{user_agent}"
        allow_redirects: false
        ssl: false
        url:
          nettacker_fuzzer:
            input_format: "{{schema}}://{target}:{{ports}}/{{endpoint}}"
            prefix: ""
            suffix: ""
            interceptors:
            data:
              schema:
                - "http"
                - "https"
              ports:
                - 80
                - 443
              endpoint:
                - graphql
                - api/graphql
                - v1/graphql
                - query
        json:
          query: "{{__schema{{types{{name}}}}}}"
          variables: "{{}}"
        response:
          condition_type: and
          conditions:
            status_code:
              regex: "200"
              reverse: false
            content:
              regex: data|errors
              reverse: false