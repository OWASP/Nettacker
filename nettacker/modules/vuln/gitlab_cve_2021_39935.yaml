info:
  name: gitlab_cve_2021_39935
  author: OWASP Nettacker Team
  severity: 8
  description: Detects GitLab instances vulnerable to CVE-2021-39935, an
    unauthenticated Server-Side Request Forgery vulnerability in the CI Lint
    API endpoint. Affects GitLab CE and EE versions 10.5 through 14.5.1.
    Unauthorized external users can perform server-side requests via the CI
    Lint API without any privileges, exposing internal services and cloud
    metadata endpoints. Added to CISA KEV catalog with federal patch deadline
    of February 24 2026. Over 49000 GitLab instances exposed online.
  reference:
    - https://nvd.nist.gov/vuln/detail/CVE-2021-39935
    - https://gitlab.com/gitlab-org/gitlab/-/issues/346569
    - https://www.cisa.gov/known-exploited-vulnerabilities-catalog
    - https://www.bleepingcomputer.com/news/security/cisa-warns-of-five-year-old-gitlab-flaw-exploited-in-attacks/
  profiles:
    - vuln
    - http
    - high_severity
    - cve2021
    - cve
    - gitlab
    - ssrf

payloads:
  - library: http
    steps:
      - method: post
        timeout: 3
        headers:
          User-Agent: "{user_agent}"
          Content-Type: "application/json"
        allow_redirects: false
        ssl: false
        url:
          nettacker_fuzzer:
            input_format: "{{schema}}://{target}:{{ports}}/{{endpoint}}"
            prefix: ""
            suffix: ""
            interceptors:
            data:
              schema:
                - "http"
                - "https"
              ports:
                - 80
                - 443
                - 8080
                - 8443
              endpoint:
                - api/v4/ci/lint
        json:
          content: "stages: [test]"
          dry_run: true
          ref: "main"
        response:
          condition_type: and
          conditions:
            status_code:
              regex: "200"
              reverse: false
            content:
              regex: "valid|errors|warnings|merged_yaml"
              reverse: false
